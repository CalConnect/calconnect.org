# Lychee link checker configuration
# https://lychee.cli.rs/#/configuration/file

# Exclude these URLs from checking (regex patterns)
# These sites timeout due to slow servers or bot protection
exclude = [
    "dhl\\.com",
]

# Accept 200, 301, 302, 303, 307, 308
accept = ["200", "301", "302", "303", "307", "308"]

# Use cache to speed up repeated runs
cache = true

# Timeout for requests (in seconds)
timeout = 20

# Maximum number of retries
max_retries = 2
