---
layout: default
---

{% if page.type == 'news' %}
<!-- Post Meta: Date and Categories -->
<div class="mb-6">
  {% if page.date %}
  <time datetime="{{ page.date | date_to_xmlschema }}" class="text-sm text-gray-500 dark:text-gray-400 font-mono">
    {{ page.date | date: "%Y-%m-%d" }}
  </time>
  {% endif %}
  {% if page.categories %}
  <div class="mt-3 flex flex-wrap gap-2">
    {% for cat in page.categories %}
    <a href="/news/category/{{ cat }}/" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-300 hover:bg-primary-200 dark:hover:bg-primary-800/40 transition-colors">
      {{ cat | replace: '-', ' ' | capitalize }}
    </a>
    {% endfor %}
  </div>
  {% endif %}
</div>
{% endif %}

{{ content }}
