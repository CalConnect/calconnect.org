title: 'CalConnect: The Calendaring and Scheduling Consortium'
email: info@calconnect.org
description: >-
  CalConnect is the standards development organization for vendors and users of
  collaboration systems and tools, in particular calendaring and scheduling.

# domain: # if you want to force HTTPS, specify the domain without the http at the start, e.g. example.com
url: https://www.calconnect.org  # the base hostname and protocol for your site, e.g. http://example.com
# baseurl: /calconnect.org # place folder name if the site is served in a subfolder

twitter_username: CalConnect
github_username:  CalConnect

# Theme configuration
logo: /assets/images/logo-purple.svg
logo_dark: /assets/images/logo-white.svg
header_cta:
  url: /membership/membership-application/
  label: Join CalConnect
copyright_url: /about/policies/copyright-and-licensing
google_analytics: G-TD2H4HZT10
schema_org:
  logo: https://www.calconnect.org/assets/images/logo-white.svg

# Build settings
theme: jekyll-calconnect-theme
plugins:
  - jekyll/vite
  - jekyll-feed
  - jekyll-archives

collections:
  events:
    output: true
    permalink: /events/:title/
  resources:
    output: true
    permalink: /resources/:title/
  membership_pages:
    output: true
    permalink: /membership/:title/
  about_pages:
    output: true
    permalink: /about/:title/
  news_pages:
    output: true
    permalink: /news/:title/
  event_pages:
    output: true
    permalink: /events/:title/
  posts:
    output: true
    permalink: /news/:year-:month-:day-:title/
  pages:
    output: true
    permalink: /:path/

# Exclude from processing.
exclude:
  - bin
  - config
  - vite.config.ts
  - tmp
  - Procfile.dev
  - .sass-cache/
  - .jekyll-cache/
  - .github/
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

jekyll-archives:
  enabled: [ categories ]
  layout: category
  permalinks:
    category: /news/:name/
