<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" class="w-full max-w-4xl mx-auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="execGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="tccGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="tcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="650" fill="transparent"/>

  <!-- Board of Directors -->
  <g filter="url(#shadow)">
    <rect x="150" y="20" width="500" height="90" rx="12" fill="url(#boardGrad)"/>
    <text x="400" y="52" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">BOARD OF DIRECTORS</text>
    <text x="400" y="75" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="13">Max 7 elected members</text>
    <text x="400" y="95" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12">Manages corporate affairs &amp; governance</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M400 110 L400 145" stroke="#cbd5e1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="400,155 393,140 407,140" fill="#cbd5e1"/>

  <!-- Executive Director -->
  <g filter="url(#shadow)">
    <rect x="150" y="160" width="500" height="90" rx="12" fill="url(#execGrad)"/>
    <text x="400" y="192" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">EXECUTIVE DIRECTOR</text>
    <text x="400" y="215" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="13">Day-to-day management of CalConnect</text>
    <text x="400" y="235" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, system-ui, sans-serif" font-size="12">Reports to the Board</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M400 250 L400 285" stroke="#cbd5e1" stroke-width="3" fill="none"/>
  <polygon points="400,295 393,280 407,280" fill="#cbd5e1"/>

  <!-- TCC -->
  <g filter="url(#shadow)">
    <rect x="100" y="300" width="600" height="130" rx="12" fill="url(#tccGrad)"/>
    <text x="400" y="332" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">TECHNICAL COORDINATION COMMITTEE (TCC)</text>
    <text x="400" y="360" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-family="Inter, system-ui, sans-serif" font-size="12">• Chairs of active Technical Committees</text>
    <text x="400" y="378" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-family="Inter, system-ui, sans-serif" font-size="12">• Appointed by Board on TC Chairs' recommendation</text>
    <text x="400" y="396" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-family="Inter, system-ui, sans-serif" font-size="12">• Approves TC documents for publication</text>
    <text x="400" y="414" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-family="Inter, system-ui, sans-serif" font-size="12">• Plans upcoming CalConnect events</text>
  </g>

  <!-- Branching arrows -->
  <path d="M400 430 L400 460 L200 460 L200 490" stroke="#cbd5e1" stroke-width="2" fill="none"/>
  <polygon points="200,500 193,485 207,485" fill="#cbd5e1"/>

  <path d="M400 430 L400 490" stroke="#cbd5e1" stroke-width="2" fill="none"/>
  <polygon points="400,500 393,485 407,485" fill="#cbd5e1"/>

  <path d="M400 430 L400 460 L600 460 L600 490" stroke="#cbd5e1" stroke-width="2" fill="none"/>
  <polygon points="600,500 593,485 607,485" fill="#cbd5e1"/>

  <!-- TC CalDAV -->
  <g filter="url(#shadow)">
    <rect x="60" y="505" width="180" height="120" rx="10" fill="url(#tcGrad)"/>
    <text x="150" y="535" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">TC CalDAV</text>
    <line x1="90" y1="548" x2="210" y2="548" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="150" y="570" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Members from</text>
    <text x="150" y="588" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">CalConnect</text>
    <circle cx="150" cy="610" r="3" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- TC iCalendar -->
  <g filter="url(#shadow)">
    <rect x="310" y="505" width="180" height="120" rx="10" fill="url(#tcGrad)"/>
    <text x="400" y="535" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">TC iCalendar</text>
    <line x1="340" y1="548" x2="460" y2="548" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="400" y="570" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Members from</text>
    <text x="400" y="588" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">CalConnect</text>
    <circle cx="400" cy="610" r="3" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- TC Timezone -->
  <g filter="url(#shadow)">
    <rect x="560" y="505" width="180" height="120" rx="10" fill="url(#tcGrad)"/>
    <text x="650" y="535" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">TC Timezone</text>
    <line x1="590" y1="548" x2="710" y2="548" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="650" y="570" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">Members from</text>
    <text x="650" y="588" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Inter, system-ui, sans-serif" font-size="11">CalConnect</text>
    <circle cx="650" cy="610" r="3" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- More TCs indicator -->
  <text x="765" y="565" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">...</text>
</svg>
